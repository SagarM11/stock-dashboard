<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta http-equiv="refresh" content="300"/>
<title>NSE Stock Scanner</title>
<style>
  :root{--bg:#0b0e14;--panel:#141925;--panel2:#1b2230;--line:#262e3d;--txt:#e6edf3;--mut:#8b97a8;
        --green:#2ecc71;--red:#ff5c5c;--amber:#ffb74d;--blue:#5b9dff;--accent:#7c5cff;}
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--txt);font:13px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;}
  header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;flex-wrap:wrap;
         position:sticky;top:0;background:var(--bg);z-index:30;}
  header h1{font-size:17px;margin:0;font-weight:650;letter-spacing:.3px;}
  .pill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;color:var(--mut);font-size:12px;}
  .toolbar{display:flex;gap:8px;padding:10px 20px;align-items:center;flex-wrap:wrap;border-bottom:1px solid var(--line);
           position:sticky;top:55px;background:var(--bg);z-index:25;}
  input,select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 10px;font-size:12px;}
  button{background:var(--panel2);border:1px solid var(--line);color:var(--mut);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;}
  button:hover{color:var(--txt);}
  .wrap{overflow:auto;height:calc(100vh - 112px);}
  table{border-collapse:collapse;width:max-content;min-width:100%;}
  th,td{padding:6px 10px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums;}
  th.h{color:var(--mut);font-weight:500;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
     border-bottom:1px solid var(--line);cursor:pointer;user-select:none;position:sticky;top:0;background:#10151f;z-index:10;}
  th.h:hover{color:var(--txt);}
  th.f{position:sticky;top:27px;background:#0d1219;z-index:10;padding:3px 6px;border-bottom:1px solid var(--line);}
  th.f input{width:78px;padding:3px 6px;font-size:11px;}
  td.l,th.l{text-align:left;}
  td.sticky,th.sticky{position:sticky;left:0;background:var(--bg);z-index:5;}
  th.sticky{background:#10151f;z-index:16;}
  th.f.sticky{background:#0d1219;z-index:16;}
  tbody tr:hover td{background:var(--panel2);}
  tbody tr td{border-bottom:1px solid #161c28;}
  .sym{font-weight:600;}
  .name{color:var(--mut);max-width:200px;overflow:hidden;text-overflow:ellipsis;}
  .ind{color:var(--mut);font-size:12px;}
  .tier{font-size:10px;color:var(--blue);background:var(--panel2);padding:1px 6px;border-radius:4px;}
  .fut{color:var(--accent);font-size:10px;margin-left:4px;}
  .pos{color:var(--green);} .neg{color:var(--red);}
  .rsi-lo{color:var(--green);font-weight:600;} .rsi-hi{color:var(--red);font-weight:600;}
  .hot{color:var(--amber);font-weight:600;}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:6px;background:var(--green);}
  .news{position:relative;cursor:help;font-weight:600;}
  .news .tip{display:none;position:absolute;right:0;top:18px;width:360px;white-space:normal;text-align:left;
    background:#0d1219;border:1px solid var(--line);border-radius:8px;padding:8px 10px;z-index:50;
    box-shadow:0 8px 24px rgba(0,0,0,.5);font-weight:400;}
  .news:hover .tip{display:block;}
  .news .hl{padding:3px 0;border-bottom:1px solid #1a2030;color:var(--txt);font-size:11.5px;}
  .news .hl em{color:var(--mut);font-style:normal;font-size:10px;}
  .sig{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.4px;}
  .sig-buy{color:#0b0e14;background:var(--green);}
  .sig-watch{color:#0b0e14;background:var(--amber);}
  .sig-avoid{color:#fff;background:#c0392b;}
  .caret{display:inline-block;width:12px;color:var(--mut);font-size:10px;}
  tr.clk{cursor:pointer;}
  tr.detail td{background:#0d1219;padding:0;}
  .panel{padding:10px 16px 14px;}
  .panel-h{color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .art{padding:8px 0;border-bottom:1px solid #1a2030;text-align:left;white-space:normal;}
  .art-h{display:flex;justify-content:space-between;gap:12px;margin-bottom:2px;}
  .art-sent{font-weight:600;font-size:11px;}
  .art-d{color:var(--mut);font-size:10.5px;}
  .art-t{font-weight:600;font-size:13px;color:var(--txt);}
  .art-b{color:var(--mut);font-size:12px;margin-top:2px;line-height:1.45;}
</style>
</head>

<header>
  <h1>📈 NSE Stock Universe</h1>

  <select id="industryFilter" onchange="render()"><option value="">All industries</option></select>
  <select id="signalFilter" onchange="render()">

    <option value="WATCH">🟡 Watch</option>

  <label style="color:var(--mut)"><input type="checkbox" id="futOnly" onchange="render()"/> F&amp;O only</label>
  <button onclick="clearFilters()">Clear filters</button>
  <span style="color:var(--mut)" id="shown"></span>
</div>

function newsCell(r){
  if(r.news_sent==null) return '<span style="color:var(--mut)">—</span>';

    return `<div class="hl"><span class="${hc}">${h.s>0?'+':''}${fmt(h.s)}</span> ${h.t} <em>${h.d}</em></div>`;

  return `<span class="news ${c}">${s>0?'+':''}${fmt(s)}<span class="tip">${heads||'no headlines'}</span></span>`;
}

// Score/signal/sub-scores are computed in Python (score.py) and shipped in the data,
// so the displayed score is identical to what gets logged & backtested.
const WEIGHTS={news:0.35, trend:0.20, momentum:0.20, perf:0.15, volume:0.10};
function scoreCell(r){
  const c = r.signal==='BUY'?'pos':r.signal==='AVOID'?'neg':'';
  const b=r._sub;
  const tip=`<div class="hl">News <b>${Math.round(b.news)}</b> ×${WEIGHTS.news}</div>`
    +`<div class="hl">Trend <b>${Math.round(b.trend)}</b> ×${WEIGHTS.trend}</div>`
    +`<div class="hl">Momentum <b>${Math.round(b.momentum)}</b> ×${WEIGHTS.momentum}</div>`
    +`<div class="hl">Perf 3M/YTD <b>${Math.round(b.perf)}</b> ×${WEIGHTS.perf}</div>`
    +`<div class="hl">Volume <b>${Math.round(b.volume)}</b> ×${WEIGHTS.volume}</div>`;
  return `<span class="news ${c}" style="font-size:13px">${r.score}<span class="tip" style="width:200px">${tip}</span></span>`;
}
function signalCell(r){
  const cls={BUY:'sig-buy',WATCH:'sig-watch',AVOID:'sig-avoid'}[r.signal];
  return `<span class="sig ${cls}">${r.signal}</span>`;
}
// ATR-based trade levels — only for BUY/WATCH. 1.5x ATR stop, 3x ATR target (2:1 R:R).
function tgt(r){
  if(r.signal==='AVOID' || r.atr==null || r.close==null) return null;
  const entry=r.close, stop=entry-1.5*r.atr, target=entry+3*r.atr;
  const up=(target-entry)/entry*100;
  const risk=entry-stop, reward=target-entry;
  return {entry, stop, target, up, rr:(reward/risk).toFixed(1)};
}

  ['symbol','Symbol','text', r=>`<span class="caret">${(r.news_all&&r.news_all.length)?(expanded.has(r.symbol)?'▾':'▸'):'&nbsp;'}</span><span class="sym">${r.symbol}</span>${r.futures?'<span class="fut">⚡</span>':''}`],

const TEXTCOLS = new Set(['symbol','name','industry','tier']);

// per-column filter values, keyed by column
const colFilters = {};

// numeric expr matcher: supports  >5  <5  >=5  <=5  10..20  =5  or plain (>=)
function numMatch(val, expr){
  if(val==null) return false;
  expr=expr.trim();
  if(expr.includes('..')){const[a,b]=expr.split('..').map(parseFloat); return val>=a&&val<=b;}
  let m=expr.match(/^(>=|<=|>|<|=)?\s*(-?\d+\.?\d*)$/);
  if(!m) return true;
  const op=m[1]||'>=', n=parseFloat(m[2]);
  return op==='>'?val>n: op==='<'?val<n: op==='<='?val<=n: op==='='?val===n: val>=n;
}
function colMatch(r,k,type,expr){
  if(!expr) return true;
  if(type==='text') return String(r[k]||'').toLowerCase().includes(expr.toLowerCase());
  return numMatch(r[k], expr);
}

// populate industry dropdown
const indSel=document.getElementById('industryFilter');
for(const ind of DATA.industries){const o=document.createElement('option');o.value=ind;o.textContent=ind;indSel.appendChild(o);}

document.getElementById('asof').textContent='Data as of '+DATA.as_of;
document.getElementById('count').textContent=DATA.total+' stocks';
document.getElementById('gen').textContent='Generated '+DATA.generated;

let sortKey='score', sortDir=-1;
const expanded=new Set();
function render(){
  const q=document.getElementById('search').value.toUpperCase();
  const tf=document.getElementById('tierFilter').value;
  const inf=document.getElementById('industryFilter').value;
  const sf=document.getElementById('signalFilter').value;
  const fo=document.getElementById('futOnly').checked;
  let rows=DATA.all.filter(r=>{
    if(q && !(r.symbol.includes(q) || (r.name||'').toUpperCase().includes(q))) return false;
    if(tf && r.tier!==tf) return false;
    if(inf && r.industry!==inf) return false;
    if(sf && r.signal!==sf) return false;
    if(fo && !r.futures) return false;
    for(const[k,l,t]of COLS){ if(!colMatch(r,k,t,colFilters[k]||'')) return false; }
    return true;
  });
  rows.sort((a,b)=>{const x=a[sortKey],y=b[sortKey];
    if(x==null)return 1; if(y==null)return -1;
    return (typeof x==='string'?x.localeCompare(y):x-y)*sortDir;});
  document.getElementById('shown').textContent=rows.length+' shown';

  let h='<table><thead><tr>';
  COLS.forEach(([k,l,t],i)=>{const sticky=i===0?'sticky':'';const la=t==='text'?'l':'';
    h+=`<th class="h ${sticky} ${la}" onclick="setSort('${k}')">${l}${sortKey===k?(sortDir<0?' ▾':' ▴'):''}</th>`;});
  h+='</tr><tr>';
  COLS.forEach(([k,l,t],i)=>{const sticky=i===0?'sticky':'';const la=t==='text'?'l':'';
    const ph=t==='num'?'>0, 10..20':'contains';
    h+=`<th class="f ${sticky} ${la}"><input data-k="${k}" placeholder="${ph}" value="${colFilters[k]||''}" oninput="setColFilter('${k}',this.value)"/></th>`;});
  h+='</tr></thead><tbody>';
  for(const r of rows){
    const hasNews=r.news_all&&r.news_all.length;
    h+=`<tr class="${hasNews?'clk':''}" ${hasNews?`onclick="toggleRow('${r.symbol}')"`:''}>`;
    COLS.forEach(([k,l,t,f],i)=>{const sticky=i===0?'sticky':'';const la=t==='text'?'l':'';
      h+=`<td class="${sticky} ${la}">${f(r)}</td>`;});
    h+='</tr>';
    if(hasNews && expanded.has(r.symbol)){
      h+=`<tr class="detail"><td class="sticky"></td><td colspan="${COLS.length-1}">${newsPanel(r)}</td></tr>`;
    }
  }
  document.getElementById('table').innerHTML=h+'</tbody></table>';
}
function newsPanel(r){
  const items=r.news_all.map(a=>{
    const c=a.s>0.15?'pos':a.s<-0.15?'neg':'';
    const lbl=(a.l||'neutral').toUpperCase();
    return `<div class="art">
      <div class="art-h"><span class="art-sent ${c}">${a.s>0?'+':''}${fmt(a.s)} · ${lbl}</span>
        <span class="art-d">${a.d} · ${a.p||''}</span></div>
      <div class="art-t">${a.t}</div>
      ${a.b?`<div class="art-b">${a.b}</div>`:''}
    </div>`;
  }).join('');
  return `<div class="panel"><div class="panel-h">📰 ${r.news_all.length} articles · ${r.symbol} (${r.name})</div>${items}</div>`;
}
function toggleRow(sym){ if(expanded.has(sym))expanded.delete(sym); else expanded.add(sym); render(); }
function setSort(k){ if(sortKey===k)sortDir*=-1; else{sortKey=k;sortDir=-1;} render(); }
function setColFilter(k,v){ colFilters[k]=v; const a=document.activeElement;
  render();
  // restore focus to the same filter box after re-render
  const el=document.querySelector(`th.f input[data-k="${k}"]`); if(el){el.focus();el.setSelectionRange(v.length,v.length);} }
function clearFilters(){ for(const k in colFilters)delete colFilters[k];
  document.getElementById('search').value=''; document.getElementById('tierFilter').value='';
  document.getElementById('industryFilter').value=''; document.getElementById('signalFilter').value='';
  document.getElementById('futOnly').checked=false; render(); }
render();
</script>
