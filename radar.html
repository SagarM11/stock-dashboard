<style>
:root{--bg:#0b0e14;--panel:#141925;--panel2:#1b2230;--line:#262e3d;--txt:#e6edf3;--mut:#8b97a8;
      --green:#2ecc71;--amber:#ffb74d;--red:#ff5c5c;--blue:#5b9dff;--accent:#7c5cff;}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--txt);font:13px/1.5 -apple-system,Segoe UI,Roboto,sans-serif;
     display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{padding:14px 20px;border-bottom:1px solid var(--line);display:flex;gap:14px;align-items:center;flex-wrap:wrap}
h1{font-size:17px;margin:0;font-weight:650}
.nav{display:flex;gap:8px;margin-left:auto}
.nav a{text-decoration:none}
.tab{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 14px;color:var(--mut);font-size:13px;font-weight:600}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:hover{color:var(--txt)}
.pill{background:var(--panel2);border:1px solid var(--line);border-radius:20px;padding:4px 12px;color:var(--mut);font-size:12px}
.note{padding:9px 20px;color:var(--amber);font-size:12px;border-bottom:1px solid var(--line);background:rgba(255,183,77,.07)}
.toolbar{padding:9px 20px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
input{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 10px;font-size:12px;width:220px}
select{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:7px;padding:6px 10px;font-size:12px}
.scrollhost{position:relative;flex:1 1 auto;min-height:0;display:flex;overflow:hidden}
.wrap{flex:1 1 auto;min-height:0;overflow:auto}
.wrap::-webkit-scrollbar{width:0;height:0}
.vscroll{position:absolute;top:0;right:2px;bottom:16px;width:13px;background:#161c28;border-radius:7px;z-index:40}
.vthumb{position:absolute;left:1px;width:11px;background:#6b7a99;border-radius:6px;cursor:grab;min-height:32px}
.vthumb:hover{background:#8b9ac0}
table{border-collapse:collapse;width:100%}
th,td{padding:7px 12px;text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
th{color:var(--mut);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);
   position:sticky;top:0;background:#10151f;cursor:pointer;user-select:none}
th:hover{color:var(--txt)}
td.l,th.l{text-align:left}
tbody tr:hover td{background:var(--panel2)}
td{border-bottom:1px solid #161c28}
.rank{color:var(--mut);width:34px}
.sym a{color:var(--txt);font-weight:700;text-decoration:none}
.sym a:hover{color:var(--blue);text-decoration:underline}
.nm{color:var(--mut);max-width:230px;overflow:hidden;text-overflow:ellipsis}
.ser{font-size:9px;font-weight:700;color:#1a1200;background:var(--amber);padding:1px 5px;border-radius:3px;margin-left:6px}
.bar{position:relative;display:inline-block;min-width:44px;text-align:right;font-weight:600}
.hot{color:var(--amber);font-weight:600}
.pos{color:var(--green)} .mut{color:var(--mut)}
</style></head><body>

let sk='score',sd=-1;
function render(){
 const q=document.getElementById('q').value.toUpperCase();
 const sf=document.getElementById('serf').value;
 let rows=DATA.candidates.filter(r=>{
   if(q&&!(r.symbol.includes(q)||(r.name||'').toUpperCase().includes(q)))return false;
   if(sf==='EQ'&&r.series!=='EQ')return false;
   if(sf==='flagged'&&r.series==='EQ')return false;
   return true;});
 rows.sort((a,b)=>{const x=a[sk],y=b[sk];if(x==null)return 1;if(y==null)return -1;
   return (typeof x==='string'?x.localeCompare(y):x-y)*sd;});
 document.getElementById('shown').textContent=rows.length+' shown';
 let h='<table><thead><tr>';
 COLS.forEach(([k,l,t])=>{h+=`<th class="${t==='text'?'l':''}" onclick="setSort('${k}')">${l}${sk===k?(sd<0?' ▾':' ▴'):''}</th>`});
 h+='</tr></thead><tbody>';
 for(const r of rows){h+='<tr>';COLS.forEach(([k,l,t,f])=>{h+=`<td class="${t==='text'?'l':''}">${f(r)}</td>`});h+='</tr>';}

 syncBar();
}
function setSort(k){if(sk===k)sd*=-1;else{sk=k;sd=-1;}render();}

function syncBar(){if(_w.scrollHeight>_w.clientHeight+1){_vs.style.display='block';
  const trk=_vs.clientHeight,th=Math.max(32,trk*_w.clientHeight/_w.scrollHeight);_vt.style.height=th+'px';
  _vt.style.top=((trk-th)*_w.scrollTop/(_w.scrollHeight-_w.clientHeight))+'px';}else _vs.style.display='none';}
_w.addEventListener('scroll',syncBar);window.addEventListener('resize',syncBar);
let _d=null;_vt.addEventListener('mousedown',e=>{_d={y:e.clientY,top:_w.scrollTop};e.preventDefault();});
